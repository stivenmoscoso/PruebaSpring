<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBoard - Thymeleaf Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased">

<nav class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center shadow-lg">
    <div class="flex items-center space-x-3">
        <div class="bg-indigo-600 p-2 rounded-lg text-white font-black text-xl tracking-wider">TB</div>
        <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">TalentBoard</h1>
    </div>
    <div class="flex items-center space-x-4">
            <span class="text-sm bg-slate-700 px-3 py-1 rounded-full text-indigo-300 font-medium border border-indigo-500/30">
                <i class="fa-solid fa-server mr-1"></i> Servido por Thymeleaf
            </span>
    </div>
</nav>

<main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">

    <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700/60 shadow-xl h-fit">
        <div class="flex items-center space-x-2 mb-6">
            <i class="fa-solid fa-circle-plus text-indigo-400 text-xl"></i>
            <h2 class="text-lg font-semibold text-white">Publicar Nueva Vacante</h2>
        </div>

        <form id="vacancyForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Título de la Vacante</label>
                <input type="text" id="title" required placeholder="Ej. Senior Java Developer"
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Área / Categoría</label>
                <input type="text" id="categoryArea" required placeholder="Ej. Tecnología / Backend"
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Modalidad</label>
                    <select id="workModality" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition">
                        <option value="REMOTE">Remoto</option>
                        <option value="HYBRID">Híbrido</option>
                        <option value="ONSITE">Presencial</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Salario (USD)</label>
                    <input type="number" id="salary" required placeholder="Ej. 3500"
                           class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Descripción de Funciones</label>
                <textarea id="description" rows="4" required placeholder="Requisitos, tecnologías del stack y beneficios..."
                          class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition resize-none"></textarea>
            </div>

            <input type="hidden" id="responsibleUserId" value="1">

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl shadow-lg shadow-indigo-600/20 transition duration-200">
                <i class="fa-solid fa-paper-plane mr-2"></i> Publicar Oferta
            </button>
        </form>
    </section>

    <section class="lg:col-span-2 space-y-6">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-briefcase text-cyan-400 text-xl"></i>
                <h2 class="text-lg font-semibold text-white">Vacantes Disponibles (Server-Side Rendered)</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <div th:each="vacancy : ${vacancies}"
                 class="bg-slate-800 p-5 rounded-2xl border border-slate-700/70 hover:border-indigo-500/50 transition-all duration-300 shadow-md flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-3">
                            <span th:text="${vacancy.status}"
                                  th:classappend="${vacancy.status.name() == 'OPEN'} ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'"
                                  class="text-xs font-bold tracking-wide uppercase px-2.5 py-1 rounded-full">
                                STATUS
                            </span>
                        <span th:text="'$' + ${#numbers.formatDecimal(vacancy.salary, 0, 'COMMA', 0, 'POINT')} + '/mo'"
                              class="text-sm font-semibold text-cyan-400">$0/mo</span>
                    </div>
                    <h3 th:text="${vacancy.title}" class="text-base font-bold text-white mb-1">Vacancy Title</h3>
                    <p class="text-xs text-indigo-300 font-medium mb-3">
                        <i class="fa-solid fa-folder-open mr-1"></i> <span th:text="${vacancy.categoryArea}">Area</span>
                    </p>
                    <p th:text="${vacancy.description}" class="text-slate-400 text-xs line-clamp-3 mb-4">Description text...</p>
                </div>

                <div class="border-t border-slate-700/60 pt-3 mt-2 flex justify-between items-center text-slate-500 text-[11px]">
                    <span><i class="fa-solid fa-location-dot mr-1"></i> <span th:text="${vacancy.workModality}">Modality</span></span>
                    <span><i class="fa-solid fa-calendar mr-1"></i> <span th:text="${vacancy.publicationDate}">Date</span></span>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(vacancies)}"
                 class="col-span-full bg-slate-800/40 border border-dashed border-slate-700 p-8 rounded-xl text-center text-slate-400">
                No hay vacantes creadas aún en el sistema.
            </div>

        </div>
    </section>
</main>

<script>
    document.getElementById('vacancyForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const payload = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            categoryArea: document.getElementById('categoryArea').value,
            workModality: document.getElementById('workModality').value,
            salary: parseFloat(document.getElementById('salary').value),
            responsibleUserId: parseInt(document.getElementById('responsibleUserId').value)
        };

        try {
            const response = await fetch('/api/vacancies', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                // Al guardarse correctamente, recargamos la página para que Thymeleaf vuelva a compilar con la nueva vacante
                window.location.reload();
            } else {
                alert('Error al guardar la vacante');
            }
        } catch (error) {
            alert('No se pudo conectar al servidor.');
        }
    });
</script>
</body>
</html>
