version: '3.8'

services:
  # Servicio de la Base de Datos (Ejemplo con PostgreSQL)
  postgres_db:
    image: postgres:15-alpine
    container_name: backend_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret_password}
      POSTGRES_DB: ${DB_NAME:-mi_base_de_datos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Servicio del Backend
  backend_app:
    build:
      context: ./backend # Ruta a la carpeta donde está tu Dockerfile
      dockerfile: Dockerfile
    container_name: backend_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret_password}
      - DB_NAME=${DB_NAME:-mi_base_de_datos}
      - JWT_SECRET=${JWT_SECRET} # Tu capa de seguridad
    depends_on:
      - postgres_db

volumes:
  postgres_data: # Permite que los datos de la BD no se borren al apagar el contenedor